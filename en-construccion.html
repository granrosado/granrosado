<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Próximamente | Gran Rosado</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Space+Mono&family=Unbounded:wght@200;400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--ink:#0a0805;--char:#141008;--rust:#C4622D;--gold:#D4A853;--dust:#6b5c4a;--cream:#F5EDD8;--b:rgba(212,168,83,.1);}
body{background:var(--ink);color:var(--cream);font-family:'Space Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 24px;}
.noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.content{position:relative;z-index:1;max-width:560px;}
.logo{font-family:'Unbounded',sans-serif;font-weight:200;font-size:12px;letter-spacing:.45em;text-transform:uppercase;color:var(--cream);text-decoration:none;display:block;margin-bottom:80px;}
.logo b{color:var(--gold);font-weight:700;}
.ghost{font-family:'Unbounded',sans-serif;font-weight:700;font-size:clamp(60px,12vw,160px);color:rgba(212,168,83,.04);line-height:1;margin-bottom:-20px;}
.title{font-family:'Playfair Display',serif;font-size:clamp(36px,5vw,64px);font-weight:900;color:var(--cream);line-height:.95;margin-bottom:16px;}
.title em{font-style:italic;color:var(--gold);font-weight:400;}
.sub{font-size:11px;color:var(--dust);line-height:1.85;margin-bottom:48px;}
.btn-g{display:inline-flex;align-items:center;gap:10px;padding:16px 44px;background:var(--gold);color:var(--ink);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.25em;text-transform:uppercase;text-decoration:none;transition:background .3s;margin-bottom:16px;}
.btn-g:hover{background:#E8D9C0;}
.btn-o{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;border:1px solid var(--b);color:var(--dust);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;transition:border-color .2s,color .2s;}
.btn-o:hover{border-color:var(--cream);color:var(--cream);}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
</style>
</head>
<body>
<div class="noise"></div>
<div class="content">
  <a href="index.html" class="logo">Gran <b>Rosado</b></a>
  <div class="ghost">Pronto</div>
  <h1 class="title">Estamos<br><em>preparando esto.</em></h1>
  <p class="sub">Esta sección está en construcción.<br>Si querés consultar, escribinos directo por WhatsApp.</p>
  <div class="btns">
    <a href="https://wa.me/5491162055558?text=Hola%20Gran%20Rosado!%20Quiero%20consultar." class="btn-g" target="_blank">Consultar por WhatsApp</a>
    <a href="index.html" class="btn-o">← Volver al inicio</a>
  </div>
</div>
</body>
</html>
